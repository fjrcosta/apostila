bookdown::gitbook:
  css: style.css
  split_by: chapter #era section
  encoding: UTF-8
  config:
    toc:
      collapse: none
      depth: 8
      before: |
        <li><a href="./">Índice</a></li>
      after: |
        <li><a href="https://fjrcosta.github.io/apostila/" target="blank">FJCosta Github</a></li>
    edit: https://github.com/fjrcosta/apostila/edit/main/%s
    #edit: https://github.com/USERNAME/REPO/edit/BRANCH/%s
    #download: ["pdf", "epub"]
    download: ["pdf"]
  includes:
    after_body: resize-toc.html
bookdown::pdf_book:
  depth: 8
  latex_engine: xelatex
  citation_package: natbib
  lang: pt
  keep_tex: yes
  includes:
    in_header: preamble.tex
